os:
  editPreset: 'nvim'
git:
  branchPrefix: 'feature/'
  pagers:
    - colorArg: always
      pager: diff-so-fancy
gui:
  theme:
    activeBorderColor:
      - '#c4a7e7'
      - bold
    inactiveBorderColor:
      - '#908caa'
    optionsTextColor:
      - '#31748f'
    selectedLineBgColor:
      - '#26233a'
    cherryPickedCommitBgColor:
      - '#403d52'
    cherryPickedCommitFgColor:
      - '#c4a7e7'
    unstagedChangesColor:
      - '#eb6f92'
    defaultFgColor:
      - '#e0def4'
    searchingActiveBorderColor:
      - '#f6c177'
